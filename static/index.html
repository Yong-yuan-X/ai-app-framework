<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自用AI · 独立框架</title>
    <meta name="description" content="可独立运行的个人 AI 问答应用框架。" data-i18n-content="metaDescription" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/ai.css" />
  </head>
  <body>
    <div class="ai-shell">
      <aside class="chat-sidebar" aria-label="对话列表" data-i18n-aria-label="conversationList">
        <div class="sidebar-top">
          <a class="back-link" href="/" aria-label="返回首页" data-i18n-aria-label="backHome">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18L9 12L15 6" />
            </svg>
          </a>
          <h1 data-i18n="appName">AI 助手</h1>
        </div>

        <button class="new-chat" type="button" id="newChatButton">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5V19" />
            <path d="M5 12H19" />
          </svg>
          <span data-i18n="newChat">新建对话</span>
        </button>

        <section class="history-section" aria-label="历史对话" data-i18n-aria-label="chatHistory">
          <h2 data-i18n="chatHistory">历史对话</h2>
          <div class="history-list" id="historyList"></div>
          <p class="history-empty" id="historyEmpty" data-i18n="emptyHistory">暂无历史对话</p>
        </section>

        <div class="profile-pill">
          <span class="avatar">L</span>
          <span class="profile-name" id="profileName">用户</span>
          <button class="settings-button" type="button" aria-label="修改配置" data-i18n-aria-label="settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5A3.5 3.5 0 1 0 12 8.5A3.5 3.5 0 0 0 12 15.5Z" />
              <path d="M19.4 15A1.7 1.7 0 0 0 19.74 16.87L19.8 16.93A2 2 0 1 1 16.97 19.76L16.91 19.7A1.7 1.7 0 0 0 15.04 19.36A1.7 1.7 0 0 0 14 20.92V21A2 2 0 1 1 10 21V20.91A1.7 1.7 0 0 0 8.89 19.35A1.7 1.7 0 0 0 7.02 19.69L6.96 19.75A2 2 0 1 1 4.13 16.92L4.19 16.86A1.7 1.7 0 0 0 4.53 14.99A1.7 1.7 0 0 0 2.97 13.95H2.88A2 2 0 1 1 2.88 9.95H2.97A1.7 1.7 0 0 0 4.53 8.91A1.7 1.7 0 0 0 4.19 7.04L4.13 6.98A2 2 0 1 1 6.96 4.15L7.02 4.21A1.7 1.7 0 0 0 8.89 4.55H8.9A1.7 1.7 0 0 0 9.94 2.99V2.9A2 2 0 1 1 13.94 2.9V2.99A1.7 1.7 0 0 0 14.99 4.55A1.7 1.7 0 0 0 16.86 4.21L16.92 4.15A2 2 0 1 1 19.75 6.98L19.69 7.04A1.7 1.7 0 0 0 19.35 8.91V8.92A1.7 1.7 0 0 0 20.91 9.96H21A2 2 0 1 1 21 13.96H20.91A1.7 1.7 0 0 0 19.4 15Z" />
            </svg>
          </button>
        </div>
        <div class="settings-menu" id="settingsMenu">
          <button type="button" id="configOpen" data-i18n="chatConfig">修改配置</button>
          <button type="button" id="ttsConfigOpen" data-i18n="voiceConfig">修改语音配置</button>
          <button type="button" id="languageToggle" data-i18n="languageToggle">English</button>
        </div>
      </aside>

      <main class="chat-main">
        <header class="chat-hero">
          <h2 data-i18n="heroTitle">今天想聊点什么？</h2>
          <p data-i18n="heroSubtitle">我可以帮你解答问题、写作创作、总结信息、分析数据等</p>
        </header>

        <section class="conversation" id="conversation" aria-live="polite"></section>

        <p class="chat-error" id="chatError" role="alert"></p>

        <form class="composer" id="chatForm">
          <div class="attachment-list" id="attachmentList"></div>
          <textarea id="chatInput" name="message" rows="1" placeholder="输入你的问题" data-i18n-placeholder="chatPlaceholder"></textarea>
          <div class="composer-actions">
            <div class="composer-tools">
              <input
                class="file-input"
                id="fileInput"
                type="file"
                multiple
              />
              <button type="button" id="attachButton" aria-label="添加附件" data-i18n-aria-label="attachFile">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21.44 11.05L12.25 20.24A6 6 0 0 1 3.76 11.75L12.95 2.56A4 4 0 0 1 18.61 8.22L9.41 17.41A2 2 0 1 1 6.59 14.59L15.07 6.1" />
                </svg>
              </button>
              <button type="button" id="voiceButton" aria-label="语音输入" data-i18n-aria-label="voiceInput">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 14A3 3 0 0 0 15 11V5A3 3 0 0 0 9 5V11A3 3 0 0 0 12 14Z" />
                  <path d="M19 11A7 7 0 0 1 5 11" />
                  <path d="M12 18V22" />
                </svg>
              </button>
            </div>
            <div class="composer-settings" aria-label="模型设置" data-i18n-aria-label="modelSettings">
              <label class="field-control">
                <span data-i18n="provider">厂商</span>
                <select id="providerSelect" name="provider">
                  <option value="xiaomi" selected>小米</option>
                  <option value="doubao">豆包</option>
                  <option value="qwen">千问</option>
                  <option value="gpt">GPT</option>
                  <option value="claude">Claude</option>
                  <option value="gemini">Gemini</option>
                  <option value="deepseek">DeepSeek</option>
                </select>
              </label>
              <label class="field-control">
                <span data-i18n="model">模型</span>
                <input id="modelSelect" name="model" list="modelSuggestions" autocomplete="off" placeholder="请输入模型名" data-i18n-placeholder="modelPlaceholder" />
              </label>
              <label class="switch-control">
                <input id="thinkingToggle" type="checkbox" />
                <span>Thinking</span>
              </label>
              <label class="switch-control search-control" title="仅管理员可开启联网搜索" data-i18n-title="webSearchTitle">
                <input id="searchToggle" type="checkbox" disabled />
                <span data-i18n="webSearch">联网搜索</span>
              </label>
            </div>
            <button class="send-button" type="submit" aria-label="发送" data-i18n-aria-label="send">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 2L11 13" />
                <path d="M22 2L15 22L11 13L2 9L22 2Z" />
              </svg>
            </button>
          </div>
        </form>
      </main>
    </div>

    <div class="modal-backdrop" id="configModal" hidden>
      <form class="config-modal" id="configForm">
        <h2 data-i18n="chatConfig">修改配置</h2>
        <label>
          <span data-i18n="modelProvider">模型厂商</span>
          <select id="configProviderSelect" name="provider">
            <option value="xiaomi">小米</option>
            <option value="doubao">豆包</option>
            <option value="qwen">千问</option>
            <option value="gpt">GPT</option>
            <option value="claude">Claude</option>
            <option value="gemini">Gemini</option>
            <option value="deepseek">DeepSeek</option>
          </select>
        </label>
        <label>
          <span data-i18n="aiModel">AI 模型</span>
          <input id="configModelInput" name="model" list="modelSuggestions" autocomplete="off" placeholder="请输入模型名" data-i18n-placeholder="modelPlaceholder" />
          <datalist id="modelSuggestions"></datalist>
        </label>
        <label>
          <span>Base URL</span>
          <input id="configBaseUrlInput" name="baseUrl" autocomplete="off" placeholder="请输入 Base URL" data-i18n-placeholder="baseUrlPlaceholder" />
        </label>
        <label>
          <span>API_KEY</span>
          <input id="configApiKeyInput" name="apiKey" type="text" autocomplete="off" placeholder="请输入 API Key" data-i18n-placeholder="apiKeyPlaceholder" />
        </label>
        <p id="configHint" data-i18n="configSavedLocal">当前配置会保存到本地 .env 文件。</p>
        <div>
          <button type="button" id="configCancel" data-i18n="cancel">取消</button>
          <button type="submit" data-i18n="save">保存</button>
        </div>
      </form>
    </div>

    <div class="modal-backdrop" id="ttsConfigModal" hidden>
      <form class="config-modal" id="ttsConfigForm">
        <h2 data-i18n="voiceConfig">修改语音配置</h2>
        <label>
          <span data-i18n="voiceProvider">语音厂商</span>
          <select id="ttsConfigProviderSelect" name="provider">
            <option value="xiaomi">小米</option>
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
          </select>
        </label>
        <label>
          <span data-i18n="voiceModel">语音模型</span>
          <input id="ttsConfigModelInput" name="model" autocomplete="off" placeholder="请输入语音模型名" data-i18n-placeholder="voiceModelPlaceholder" />
        </label>
        <label>
          <span data-i18n="voiceBaseUrl">语音 Base URL</span>
          <input id="ttsConfigBaseUrlInput" name="baseUrl" autocomplete="off" placeholder="请输入语音 Base URL" data-i18n-placeholder="voiceBaseUrlPlaceholder" />
        </label>
        <label>
          <span data-i18n="voice">音色</span>
          <input id="ttsConfigVoiceInput" name="voice" autocomplete="off" placeholder="请输入音色" data-i18n-placeholder="voicePlaceholder" />
        </label>
        <label>
          <span data-i18n="voiceApiKey">语音 API_KEY</span>
          <input id="ttsConfigApiKeyInput" name="apiKey" type="text" autocomplete="off" placeholder="请输入语音 API Key" data-i18n-placeholder="voiceApiKeyPlaceholder" />
        </label>
        <p id="ttsConfigHint" data-i18n="voiceConfigSavedLocal">语音配置会保存到本地 .env 文件。</p>
        <div>
          <button type="button" id="ttsConfigCancel" data-i18n="cancel">取消</button>
          <button type="submit" data-i18n="save">保存</button>
        </div>
      </form>
    </div>

    <script src="./js/ai.js"></script>
  </body>
</html>
